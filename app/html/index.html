<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать!</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --text-color: #1f2937;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-color);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        .icon {
            width: 80px; height: 80px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border-radius: 20px;
            margin: 0 auto 1.5rem;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2rem;
        }

        h1 {
            font-size: 2rem; font-weight: 600; margin-bottom: 1rem;
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        p { line-height: 1.6; color: #4b5563; margin-bottom: 2rem; }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover { background: #4f46e5; transform: translateY(-2px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✨</div>
        <h1>Рады вас видеть!</h1>
        <p>Вы успешно зашли на нашу новую страницу. Мы постарались сделать её максимально простой и приятной для глаз.</p>
        <!-- Ссылка ведет на страницу 404 -->
        <a href="site.html" class="btn">Начать работу</a>
    </div>
</body>
</html>
