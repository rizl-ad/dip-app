<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --text-color: #1f2937;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-color);
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        .error-code {
            font-size: 6rem; font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0.15;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .content { position: relative; z-index: 1; }

        .icon {
            width: 80px; height: 80px;
            background: #fff; border: 2px solid #e5e7eb;
            border-radius: 20px; margin: 0 auto 1.5rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
        }

        h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 1rem; }
        p { line-height: 1.6; color: #6b7280; margin-bottom: 2.5rem; }

        .btn {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .btn:hover { background: #4f46e5; transform: translateY(-2px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="error-code">404</div>
        <div class="content">
            <div class="icon">🔍</div>
            <h1>Упс! Страница потерялась</h1>
            <p>Похоже, мы не можем найти то, что вы ищете. Давайте вернемся назад.</p>
            
            <!-- Ссылка ведет обратно на index.html -->
            <a href="index.html" class="btn">Назад</a>
        </div>
    </div>

</body>
</html>
