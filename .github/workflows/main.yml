name: Application CI/CD

on:
  push:
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_build:
        description: Enter "YES" to run build and push app image
        required: true
        default: 'no'
      run_deploy:
        description: Enter "YES" to run deploy image to K8s
        required: true
        default: 'no'
  repository_dispatch:
    types: [ deploy-app ]

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            build:
              - 'app/**'
              - 'charts/**'

  build-and-push:
    name: Build image and push to registry
    needs: detect-changes
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_build == 'YES') ||
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.build == 'true')
    runs-on: gha-arc-runner-set

    environment: code_review

    permissions:
      contents: write
    
    steps:
      - name: Clone repository on runner
        uses: actions/checkout@v6

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Check required files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
          YC_INFRA_BUCKET_NAME: ${{ fromJSON(vars.YC_INFRA_BUCKET).name }}
          TF_BACKEND_S3: ${{ vars.TF_BACKEND_S3 }}
        run: |
          set -euo pipefail

          check_file () {
            local key="$1"
            aws s3api head-object \
              --bucket "YC_INFRA_BUCKET_NAME" \
              --key "$key" \
              --endpoint-url "$TF_BACKEND_S3"
          }

          check_file "$APP_DATA_PATH"
          echo "The required files were found."

      - name: Download required files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
          YC_INFRA_BUCKET_NAME: ${{ fromJSON(vars.YC_INFRA_BUCKET).name }}
          TF_BACKEND_S3: ${{ vars.TF_BACKEND_S3 }}
        run: |
          aws s3 cp "s3://YC_INFRA_BUCKET_NAME/$APP_DATA_PATH" \
            "$APP_DATA_PATH" --endpoint-url="$TF_BACKEND_S3"

      # Настройка сборщика для работы с dind-контейнером
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://localhost:2375

      - name: Yandex Cloud login
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_INFRA_SA_KEY }}

      - name: Create version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: 'v'
          INITIAL_VERSION: 1.0.0

      - name: Get app data
        env:
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
          APP_NAME: ${{ vars.APP_NAME }}
        run: |
          REGISTRY_ID=$(jq -r .registry_id "$APP_DATA_PATH")
          echo "::add-mask::$REGISTRY_ID"
          echo "IMAGE_PATH=cr.yandex/$REGISTRY_ID/$APP_NAME" >> $GITHUB_ENV

      # Подготовка тегов: sha для коммита, v*.*.* для тега
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PATH }}
          tags: |
            type=sha,prefix=
            type=ref,event=tag
          labels: |
            app=nginx

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy app image to K8s cluster
    needs: [ detect-changes, build-and-push ]
    if: |
      !cancelled() && !failure() &&
      needs.detect-changes.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_deploy == 'YES') ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build-and-push.result == 'success')
      )
    runs-on: gha-arc-runner-set

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Get app data
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          APP_NAMESPACE: ${{ vars.APP_NAMESPACE }}
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
        run: |
          REGISTRY_ID=$(jq -r .registry_id "$APP_DATA_PATH")
          echo "::add-mask::$REGISTRY_ID"
          echo "IMAGE_PATH=cr.yandex/$REGISTRY_ID/$APP_NAME" >> $GITHUB_ENV

          APP_PORT=$(jq -r .port "$APP_DATA_PATH")

      - name: Deploy to K8s via Helm
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          helm upgrade --install test ./charts/$APP_NAME \
            --namespace $APP_NAMESPACE \
            --set image.repository=$IMAGE_PATH \
            --set image.tag=$TAG \
            --set service.port=$APP_PORT \
            --set service.targetPort=$APP_PORT \
            --set networkPolicy.ingress.ports.port=$APP_PORT \
            --wait --timeout 5m
