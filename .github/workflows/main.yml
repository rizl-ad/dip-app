name: Application CI/CD

on:
  push:
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [ deploy-app ]

jobs:
  build-and-push:
    # Используется имя Runner Set из Ansible
    runs-on: gha-arc-runner-set

    # outputs:
    #   app_data_path: ${{ steps.repos_vars.outputs.APP_DATA_PATH }}
    #   tf_backend_s3: ${{ steps.repos_vars.outputs.TF_BACKEND_S3 }}
    #   yc_infra_bucket_name: ${{ steps.repos_vars.outputs.YC_INFRA_BUCKET_NAME }}
    #   yc_infra_sa_key_file_path: ${{ steps.repos_vars.outputs.YC_INFRA_SA_KEY_FILE_PATH }}
    #   k8s_version: ${{ steps.repos_vars.outputs.K8S_VERSION }}
    #   image_path: ${{ steps.app_data.outputs.IMAGE_PATH }}
    #   app_port: ${{ steps.app_data.outputs.APP_PORT }}

    environment: code_review

    permissions:
      contents: write
    
    steps:
      - name: Clone repository on runner
        uses: actions/checkout@v6

      # - name: Generate token
      #   id: repos_vars_token
      #   uses: actions/create-github-app-token@v3
      #   with:
      #     app-id: ${{ secrets.REMOTE_WORKFLOW_CALL_APP_ID }}
      #     private-key: ${{ secrets.REMOTE_WORKFLOW_CALL_APP_PRIVATE_KEY }}
      #     owner: ${{ github.repository_owner }}
      #     repositories: |
      #       dip-yc
      #       dip-k8s
      #       dip-app

      # - name: Read variables from repositories
      #   id: repos_vars
      #   env:
      #     GH_TOKEN: ${{ steps.repos_vars_token.outputs.token }}
      #   run: |
      #     VAR_APP_DATA=$(gh variable get APP_DATA --repo "rizl-ad/dip-yc")
      #     { echo "APP_DATA_PATH<<ROF"; echo $(echo "$VAR_APP_DATA" | jq -r '.dir_path + "/" + .name'); echo "EOF"; } >> $GITHUB_ENV

      #     VAR_TF_BACKEND_S3=$(gh variable get TF_BACKEND_S3 --repo "rizl-ad/dip-yc")
      #     echo "TF_BACKEND_S3=$VAR_TF_BACKEND_S3" >> $GITHUB_ENV

      #     VAR_YC_INFRA_BUCKET=$(gh variable get YC_INFRA_BUCKET --repo "rizl-ad/dip-yc")
      #     { echo "YC_INFRA_BUCKET_NAME<<EOF"; echo $(echo "$VAR_YC_INFRA_BUCKET" | jq -r .name); echo "EOF" } >> $GITHUB_ENV

      # VAR_K8S_VERSION=$(gh variable get K8S_VERSION --repo "rizl-ad/dip-k8s")
      # echo "K8S_VERSION=$VAR_K8S_VERSION" >> $GITHUB_ENV

      # VAR_YC_INFRA_SA_KEY_FILE=$(gh variable get YC_INFRA_SA_KEY_FILE --repo "rizl-ad/dip-yc")
      # VAR_YC_INFRA_SA_KEY_FILE_PATH=$(echo "$VAR_YC_INFRA_SA_KEY_FILE" | jq -r '.dir_path + "/" + .name')
      # echo "YC_INFRA_SA_KEY_FILE_PATH=$VAR_YC_INFRA_SA_KEY_FILE_PATH" >> $GITHUB_ENV

      - name: Check required files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
          YC_INFRA_BUCKET_NAME: ${{ fromJSON(vars.YC_INFRA_BUCKET).name }}
          TF_BACKEND_S3: ${{ vars.TF_BACKEND_S3 }}
        run: |
          set -euo pipefail

          check_file () {
            local key="$1"
            aws s3api head-object \
              --bucket "YC_INFRA_BUCKET_NAME" \
              --key "$key" \
              --endpoint-url "$TF_BACKEND_S3" > /dev/null 2>&1 || \
              { echo "File $key not found. Run the Terraform yc-infra project."; exit 1; }
          }

          check_file "$APP_DATA_PATH"
          echo "The required files were found."

      # check_file "$YC_INFRA_SA_KEY_FILE_PATH"

      - name: Download required files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
          YC_INFRA_BUCKET_NAME: ${{ fromJSON(vars.YC_INFRA_BUCKET).name }}
          TF_BACKEND_S3: ${{ vars.TF_BACKEND_S3 }}
        run: |
          aws s3 cp "s3://YC_INFRA_BUCKET_NAME/$APP_DATA_PATH" \
            "$APP_DATA_PATH" --endpoint-url="$TF_BACKEND_S3"
      # aws s3 cp "s3://YC_INFRA_BUCKET_NAME/$YC_INFRA_SA_KEY_FILE_PATH" \
      #   "$YC_INFRA_SA_KEY_FILE_PATH" --endpoint-url="$TF_BACKEND_S3"

      # Настройка сборщика для работы с dind-контейнером
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://localhost:2375

      - name: Yandex Cloud login
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_INFRA_SA_KEY }}

      - name: Create version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: 'v'
          INITIAL_VERSION: 1.0.0

      - name: Get app data
        # id: app_data
        env:
          # GH_TOKEN: ${{ steps.repos_vars_token.outputs.token }}
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
          APP_NAME: ${{ vars.APP_NAME }}
        run: |
          REGISTRY_ID=$(jq -r .registry_id "$APP_DATA_PATH")
          echo "::add-mask::$REGISTRY_ID"
          echo "IMAGE_PATH=cr.yandex/$REGISTRY_ID/$APP_NAME" >> $GITHUB_ENV

      # Подготовка тегов: sha для коммита, v*.*.* для тега
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PATH }}
          tags: |
            type=sha,prefix=
            type=ref,event=tag

      # Сборка и отправка образа
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    # Деплой запускается только если это пуш тега v*
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: gha-arc-runner-set

    # env:
    #   APP_NAME: ${{ vars.APP_NAME }}
    #   APP_NAMESPACE: ${{ vars.APP_NAMESPACE }}
      # APP_PORT: ${{ needs.build-and-push.outputs.APP_PORT }}
      # IMAGE_PATH: ${{ needs.build-and-push.outputs.image_path }}
      # K8S_VERSION: ${{ needs.build-and-push.outputs.K8S_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      # - name: Generate token
      #   id: repos_vars_token
      #   uses: actions/create-github-app-token@v3
      #   with:
      #     app-id: ${{ secrets.REMOTE_WORKFLOW_CALL_APP_ID }}
      #     private-key: ${{ secrets.REMOTE_WORKFLOW_CALL_APP_PRIVATE_KEY }}
      #     owner: ${{ github.repository_owner }}
      #     repositories: |
      #       dip-yc
      #       dip-k8s
      #       dip-app

      - name: Get app data
        # id: app_data
        env:
          # GH_TOKEN: ${{ steps.repos_vars_token.outputs.token }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_NAMESPACE: ${{ vars.APP_NAMESPACE }}
          APP_DATA_PATH: ${{ fromJSON(vars.APP_DATA).dir_path }}/${{ fromJSON(vars.APP_DATA).name }}
        run: |
          REGISTRY_ID=$(jq -r .registry_id "$APP_DATA_PATH")
          echo "::add-mask::$REGISTRY_ID"
          echo "IMAGE_PATH=cr.yandex/$REGISTRY_ID/$APP_NAME" >> $GITHUB_ENV

          APP_PORT=$(jq -r .port "$APP_DATA_PATH")

      - name: Deploy to K8s via Helm
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          helm upgrade --install test ./charts/$APP_NAME \
            --namespace $APP_NAMESPACE \
            --set image.repository=$IMAGE_PATH \
            --set image.tag=$TAG \
            --set service.port=$APP_PORT \
            --set service.targetPort=$APP_PORT \
            --set networkPolicy.ingress.ports.port=$APP_PORT \
            --wait --timeout 5m
